<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>B1 Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Plugin CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
  <style>
    :root {
      --base-font-size: 19px;
      --sidebar-width: 330px;
      --sidebar-background: #fdfdfd;
    }

    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid #f0f0f0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.02);
    }
    
    /* Styling for the list items to make them pill-shaped */
    .sidebar-nav ul li a {
      font-size: 18px;
      font-weight: 500;
      color: #555;
      padding: 10px 16px;
      margin: 4px 12px;
      border-radius: 8px;
      transition: all 0.2s ease;
      display: block;
    }

    /* Styling for the folder labels */
    .sidebar-nav p,
    .sidebar-nav li > span {
      font-weight: 600;
      font-size: 19px;
      color: #333;
      padding: 12px 16px;
      margin: 4px 0 0 0;
      cursor: pointer;
    }
    
    /* Hover effects for links */
    .sidebar-nav ul li a:hover {
      background-color: #f1f3f5;
      color: #42b983;
      text-decoration: none;
    }

    /* Active page highlight */
    .sidebar-nav li.active > a {
      background-color: #e8f5e9;
      color: #42b983;
      font-weight: 600;
      border-right: none;
    }

    /* Headers */
    .markdown-section h1 { font-size: 2.6rem; margin-top: 1.5rem; color: #2c3e50; }
    .markdown-section h2 { font-size: 2.1rem; margin-top: 2rem; color: #2c3e50; }
    .markdown-section h3 { font-size: 1.6rem; color: #2c3e50; }
    .markdown-section { color: #34495e; line-height: 1.7; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'B1 Docs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      sidebarDisplayLevel: 1, // Collapse levels beyond 1 by default
      auto2top: true,
      search: 'auto',
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Zoom image -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- Sidebar Collapse Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
